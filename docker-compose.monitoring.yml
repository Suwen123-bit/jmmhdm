version: '3.9'

# 监控可观测性栈：Prometheus + Grafana + Loki + Promtail + OTel Collector + Tempo
# 使用：docker compose -f docker-compose.monitoring.yml up -d
# 访问 Grafana: http://localhost:3000 (admin/admin)

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cp-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: cp-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - '9093:9093'

  grafana:
    image: grafana/grafana:11.3.0
    container_name: cp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '3000:3000'

  loki:
    image: grafana/loki:3.2.0
    container_name: cp-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    volumes:
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.2.0
    container_name: cp-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      # docker logs（容器化部署时）
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  tempo:
    image: grafana/tempo:2.6.0
    container_name: cp-tempo
    restart: unless-stopped
    command: ['-config.file=/etc/tempo.yaml']
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - '3200:3200' # tempo HTTP
      - '4318:4318' # OTLP HTTP

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: cp-otel-collector
    restart: unless-stopped
    command: ['--config=/etc/otel-collector.yaml']
    volumes:
      - ./monitoring/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4319:4318' # OTLP HTTP (mapped to avoid conflict with tempo)

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  alertmanager-data:
